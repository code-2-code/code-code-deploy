{{- if .Values.authorizationPolicies.enabled }}
{{- /*
  Per-service source namespace definitions.
  Each service only accepts traffic from namespaces that actually call it.
  observability is universally included for Prometheus metrics scraping.
*/ -}}
{{- $self := .Release.Namespace -}}
{{- $console := .Values.global.consoleNamespace -}}
{{- $showcase := .Values.global.showcaseNamespace -}}
{{- $net := .Values.global.networkNamespace -}}
{{- $runs := .Values.global.runNamespace -}}
{{- $obs := .Values.global.observabilityNamespace -}}
{{- $perServicePolicies := list
  (dict "service" .Values.components.auth.name                    "sources" (list $self $console $net $obs))
  (dict "service" .Values.components.model.name                   "sources" (list $self $console $showcase $obs))
  (dict "service" .Values.components.provider.name                "sources" (list $self $console $showcase $obs))
  (dict "service" .Values.components.providerOrchestration.name   "sources" (list $self $obs))
  (dict "service" .Values.components.profile.name                 "sources" (list $self $console $obs))
  (dict "service" .Values.components.support.name                 "sources" (list $self $console $showcase $obs))
  (dict "service" .Values.components.cliRuntime.name              "sources" (list $self $obs))
  (dict "service" .Values.components.agentRuntime.name            "sources" (list $self $console $runs $obs))
  (dict "service" .Values.components.chat.name                    "sources" (list $self $console $obs))
-}}
{{- range $i, $policy := $perServicePolicies }}
{{- if $i }}
---
{{- end }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $policy.service }}
  namespace: {{ $.Release.Namespace }}
  labels:
{{ include "platform.labels" (dict "root" $ "name" $policy.service "componentLabel" "authz") | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $policy.service }}
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
{{- range $ns := $policy.sources }}
              - {{ $ns | quote }}
{{- end }}
{{- end }}
---
{{- $platformSources := list .Release.Namespace .Values.global.consoleNamespace .Values.global.showcaseNamespace .Values.global.networkNamespace .Values.global.runNamespace .Values.global.observabilityNamespace | uniq }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: platform-egress-service
  namespace: {{ .Values.global.networkNamespace }}
  labels:
{{ include "platform.labels" (dict "root" . "name" "platform-egress-service" "componentLabel" "authz") | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ .Values.components.egress.name }}
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
{{- range $namespace := $platformSources }}
              - {{ $namespace | quote }}
{{- end }}
---
{{- $edgeSources := list .Values.global.networkNamespace .Values.global.observabilityNamespace | uniq }}
{{- $consoleSources := append $edgeSources .Values.global.consoleNamespace | uniq }}
{{- $showcaseSources := append $edgeSources .Values.global.showcaseNamespace | uniq }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: console-ingress-workloads
  namespace: {{ .Values.global.consoleNamespace }}
  labels:
{{ include "platform.labels" (dict "root" . "name" "console-ingress-workloads" "componentLabel" "authz") | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
{{- range $namespace := $consoleSources }}
              - {{ $namespace | quote }}
{{- end }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: showcase-ingress-workloads
  namespace: {{ .Values.global.showcaseNamespace }}
  labels:
{{ include "platform.labels" (dict "root" . "name" "showcase-ingress-workloads" "componentLabel" "authz") | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
{{- range $namespace := $showcaseSources }}
              - {{ $namespace | quote }}
{{- end }}
{{- end }}

