global:
  domain: "example.com"
  ingressNamespace: "istio-ingress"

stalwart:
  enabled: true
  image:
    repository: stalwartlabs/mail-server
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1

snappymail:
  enabled: true
  image:
    repository: snappymail/snappymail
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1

postgresql:
  enabled: true
  auth:
    username: stalwart
    password: "stalwart-secure-password"
    database: stalwart
  primary:
    persistence:
      enabled: true
      size: 10Gi

minio:
  enabled: true
  auth:
    rootUser: "minioadmin"
    rootPassword: "minioadminpassword"
  defaultBuckets: "stalwart-blobs"
  persistence:
    enabled: true
    size: 100Gi

ingress:
  webmailHost: "webmail.example.com"
  adminHost: "admin.mail.example.com"
  gatewayName: "istio-ingress" # Name of the Gateway resource
