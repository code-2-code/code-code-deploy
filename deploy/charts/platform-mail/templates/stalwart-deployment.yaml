apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform-mail.fullname" . }}-stalwart
  labels:
    app.kubernetes.io/name: stalwart
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.stalwart.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: stalwart
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stalwart
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: stalwart
          image: "{{ .Values.stalwart.image.repository }}:{{ .Values.stalwart.image.tag }}"
          imagePullPolicy: {{ .Values.stalwart.image.pullPolicy }}
          ports:
            - name: smtp
              containerPort: 25
              protocol: TCP
            - name: smtps
              containerPort: 465
              protocol: TCP
            - name: submission
              containerPort: 587
              protocol: TCP
            - name: imaps
              containerPort: 993
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /opt/stalwart/etc/config.toml
              subPath: config.toml
      volumes:
        - name: config
          configMap:
            name: {{ include "platform-mail.fullname" . }}-stalwart
