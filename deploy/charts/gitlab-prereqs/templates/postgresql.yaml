apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gitlabPrereqs.postgresqlName" . }}-init
  labels:
    {{- include "gitlabPrereqs.labels" . | nindent 4 }}
data:
  10-gitlab-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS amcheck;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    CREATE EXTENSION IF NOT EXISTS btree_gist;
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitlabPrereqs.postgresqlName" . }}
  labels:
    {{- include "gitlabPrereqs.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - name: tcp-postgresql
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
  selector:
    {{- include "gitlabPrereqs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gitlabPrereqs.postgresqlName" . }}
  labels:
    {{- include "gitlabPrereqs.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ include "gitlabPrereqs.postgresqlName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "gitlabPrereqs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "gitlabPrereqs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          args:
            - -c
            - max_connections={{ .Values.postgresql.config.maxConnections }}
            - -c
            - shared_buffers={{ .Values.postgresql.config.sharedBuffers }}
            - -c
            - work_mem={{ .Values.postgresql.config.workMem }}
            - -c
            - maintenance_work_mem={{ .Values.postgresql.config.maintenanceWorkMem }}
            - -c
            - statement_timeout={{ .Values.postgresql.config.statementTimeout }}
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.passwordKey }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ "ALL" ]
              add: [ "CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID" ]
      volumes:
        - name: init
          configMap:
            name: {{ include "gitlabPrereqs.postgresqlName" . }}-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.postgresql.storage.size }}
