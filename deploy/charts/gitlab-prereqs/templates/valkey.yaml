apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitlabPrereqs.valkeyName" . }}
  labels:
    {{- include "gitlabPrereqs.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  type: ClusterIP
  ports:
    - name: tcp-valkey
      port: {{ .Values.valkey.service.port }}
      targetPort: valkey
  selector:
    {{- include "gitlabPrereqs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gitlabPrereqs.valkeyName" . }}
  labels:
    {{- include "gitlabPrereqs.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  serviceName: {{ include "gitlabPrereqs.valkeyName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "gitlabPrereqs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: valkey
  template:
    metadata:
      labels:
        {{- include "gitlabPrereqs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: valkey
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: "{{ .Values.valkey.image.repository }}:{{ .Values.valkey.image.tag }}"
          imagePullPolicy: {{ .Values.valkey.image.pullPolicy }}
          command: [ "sh", "-ec" ]
          args:
            - exec valkey-server --appendonly yes --requirepass "$VALKEY_PASSWORD"
          ports:
            - name: valkey
              containerPort: 6379
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.valkey.existingSecret }}
                  key: {{ .Values.valkey.passwordKey }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - REDISCLI_AUTH="$VALKEY_PASSWORD" valkey-cli ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - REDISCLI_AUTH="$VALKEY_PASSWORD" valkey-cli ping | grep -q PONG
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ "ALL" ]
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.valkey.storage.size }}
