runnerScaleSetName: code-code-k8s
githubConfigUrl: https://github.com/code-2-code
githubConfigSecret: github-arc-auth

minRunners: 2
maxRunners: 4

controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller

listenerTemplate:
  spec:
    containers:
      - name: listener
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

template:
  spec:
    securityContext:
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch
    initContainers:
      - name: init-dind-externals
        image: ghcr.io/actions/actions-runner:2.333.1
        command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:2.333.1
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: "120"
          - name: RUNNER_TOOL_CACHE
            value: /opt/hostedtoolcache
          - name: AGENT_TOOLSDIRECTORY
            value: /opt/hostedtoolcache
          - name: GOMODCACHE
            value: /home/runner/.cache/go/pkg/mod
          - name: GOCACHE
            value: /home/runner/.cache/go-build
          - name: NPM_CONFIG_CACHE
            value: /home/runner/.cache/npm
          - name: npm_config_cache
            value: /home/runner/.cache/npm
          - name: PIP_CACHE_DIR
            value: /home/runner/.cache/pip
          - name: UV_CACHE_DIR
            value: /home/runner/.cache/uv
        envFrom:
          - configMapRef:
              name: code-code-runner-mirrors
              optional: true
        resources:
          requests:
            cpu: "1"
            memory: 1Gi
            ephemeral-storage: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi
            ephemeral-storage: 32Gi
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: runner-package-cache
            mountPath: /home/runner/.cache
      - name: dind
        image: docker:dind
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --group=$(DOCKER_GROUP_GID)
          - --registry-mirror=http://code-code-cache-docker-io.code-code-infra.svc.cluster.local:5000
        env:
          - name: DOCKER_GROUP_GID
            value: "123"
        securityContext:
          privileged: true
        restartPolicy: Always
        startupProbe:
          exec:
            command:
              - docker
              - info
          initialDelaySeconds: 0
          failureThreshold: 24
          periodSeconds: 5
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 8Gi
          limits:
            cpu: "4"
            memory: 12Gi
            ephemeral-storage: 48Gi
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
    volumes:
      - name: work
        emptyDir:
          sizeLimit: 32Gi
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      - name: runner-package-cache
        persistentVolumeClaim:
          claimName: code-code-runner-package-cache
